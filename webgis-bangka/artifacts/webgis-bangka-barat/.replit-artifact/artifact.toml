kind = "web"
previewPath = "/"
title = "WebGIS Bangka Barat"
version = "1.0.0"
id = "artifacts/webgis-bangka-barat"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24950

[services.development]
run = "pnpm --filter @workspace/webgis-bangka-barat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/webgis-bangka-barat", "run", "build" ]
serve = "static"
publicDir = "artifacts/webgis-bangka-barat/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24950"
BASE_PATH = "/"
